DATA_FILTERING:
  # Path(s) to raw HDF5 v2.0 dataset(s) to filter.
  hdf5_paths:
    - "/path/to/large_dataset.h5"
  # use_multihead_model: false  # Set true to use one output head per dataset
  #                             # (requires >= 2 hdf5_paths). Default: false,
  #                             # meaning a single-head model is trained on the
  #                             # combined data even when multiple paths are given.
  #                             # NOTE: if you previously relied on multiple paths
  #                             # automatically enabling multi-head, add this flag.
  #                             # Each filtered structure is tagged with
  #                             # source_dataset (HDF5 stem) in companion
  #                             # *_sources.json files saved alongside the output.

  # To start data filtering from a pre-trained model, add to model.yaml:
  #
  # TRAINING:
  #   pretrained_model: "/path/to/existing_model.pth"   # full model file
  #   # pretrained_weights: "/path/to/weights.pth"      # weights-only alternative
  #   perform_finetuning: false  # set true to freeze layers (see model.yaml options)
  #
  # On restart, the DF checkpoint takes precedence over pretrained_model;
  # the pretrained path is only used on the very first initialisation.
  # For multi-head DF from a single-head pretrained model, also set:
  #   convert_to_multihead: true

  # --- Evaluation ---
  shuffle_dataset: True  # Shuffle dataset indices before chunking to avoid
                         # sampling bias from inherent dataset structure (e.g.
                         # MD frames grouped by system or sorted by energy).
  loop_exhausted_data: True  # Re-loop through the full dataset (with a fresh
                             # shuffle) when all chunks are evaluated but
                             # targets are not yet reached.
  # max_data_passes: 0       # Max passes through the dataset; 0 = unlimited.
  num_chunks: 8          # Dataset is split into this many sequential chunks;
                         # each chunk is evaluated in one pass.
  eval_stride: 500       # Structures evaluated per evaluation step.
  eval_batch_size: null  # Batch size inside each evaluation step (null = auto).
  error_type: forces     # Filtering metric: forces | energy | both.

  # --- Stopping criteria ---
  desired_acc: 0.05      # Stop when validation MAE (eV/Å) drops below this.
                         # Set to 0.0 to disable.
  max_train_set_size: 10000  # Stop after collecting this many training structures.

  # --- Threshold ---
  c_x: 0.0              # Threshold adjustment factor (negative = tighten,
                         # positive = loosen, same meaning as in active learning).
  freeze_threshold_dataset: .inf  # Freeze threshold once this many training
                                  # structures are collected.

  # --- Training ---
  epochs_per_batch: 50   # Training epochs each time new points are added.
  valid_ratio: 0.1       # Fraction of collected structures reserved for validation.
  valid_skip: 1          # Validate every N epochs.
  replay_strategy: full_dataset  # full_dataset | random_subset.
  # train_subset_size: null  # Required when replay_strategy = random_subset.
  # valid_subset_size: null  # Validation subset size for random_subset replay.

  # --- Convergence ---
  converge_best: True         # Final convergence pass on the collected dataset.
  convergence_patience: 50    # Epochs without improvement before stopping.
  max_convergence_epochs: 500 # Hard limit on convergence epochs.
  margin: 0.002               # Minimum improvement to reset patience counter.

  # --- Output ---
  compact_logging: False  # Set True to suppress per-batch worker/threshold/
                          # dataloader detail (demoted to DEBUG). Only points-
                          # added and epoch-result lines remain as INFO.
  save_xyz: False    # Also write filtered dataset as XYZ (HDF5 is always saved).
  analysis: False    # Collect per-batch losses and thresholds for analysis.

MISC:
  # All output (logs, models, checkpoints, filtered datasets) goes here.
  output_dir: "./filter_output"
  create_restart: True

# Optional: submit evaluation workers to a Slurm cluster via PARSL.
# Remove this section entirely to run locally (ProcessPoolExecutor).
# Note: launch_str (DFT command) is NOT needed for data filtering.
#
# CLUSTER:
#   type: slurm
#   project_name: 'filter_example'
#   worker_device: cpu   # Device for evaluation workers (default: cpu).
#                        # Set to cuda if worker nodes have GPUs.
#   parsl_options:
#     nodes_per_block: 1
#     init_blocks: 1
#     min_blocks: 1
#     max_blocks: 8
#     label: 'filter_example'
#     # cmd_timeout: 10    # Seconds to wait for sbatch/squeue/scancel to respond.
#     #                    # Increase (e.g. 30-60) on clusters with slow schedulers.
#   slurm_str: |
#     #SBATCH --job-name=filter_example
#     #SBATCH --partition=gpu
#     #SBATCH --nodes=1
#     #SBATCH --ntasks-per-node=1
#     #SBATCH --gres=gpu:1
#     #SBATCH --time=24:00:00
#     #SBATCH --account=XXX
#   worker_str: |
#     source path/to/your/conda/bin/activate my_env
